# .github/workflows/cla-check.yml
# This workflow checks DLR's Individual Contributor License Agreement.

name: "Check DLR's individual CLA"
on:
  pull_request:
    types: [opened, edited]

jobs:
  check-cla:
    runs-on: ubuntu-latest
    steps:
      - name: Check if user is from DLR-SR
        id: check_org
        run: |
          # User of PR
          USER_LOGIN="${{ github.event.pull_request.user.login }}"
          ORG_NAME="DLR-SR"

          # Check if user is from ORG_NAME
          if curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/users/$USER_LOGIN/orgs" | \
            grep -q "\"login\":\"$ORG_NAME\""; then
            echo "User $USER_LOGIN is from $ORG_NAME → skipping CLA check."
            echo "skip_cla=true" >> $GITHUB_ENV
          else
            echo "User $USER_LOGIN is external → CLA check required."
            echo "skip_cla=false" >> $GITHUB_ENV
          fi

      - name: Skip CLA check if user is from ORG_NAME
        if: ${{ env.skip_cla == 'true' }}
        run: |
          echo "CLA check skipped for internal contributor."

      - name: Check for CLA label (only for external contributors)
        if: ${{ env.skip_cla == 'false' }}
        run: |
          if ! gh pr view --json labels | grep -q '"name":"CLA-signed"'; then
            echo "U+274C CLA not signed yet. Please sign the CLA and add the 'CLA-signed' label."
            exit 1
          else
            echo "CLA signed. Proceeding..."
          fi